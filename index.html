<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Inclusive Accessibility Hub</title><script src="https://unpkg.com/lunr/lunr.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Segoe UI,sans-serif;background:#f0f4f8}header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:2rem;text-align:center}h1{font-size:2rem;margin-bottom:.5rem}header p{opacity:.85;font-size:1rem}.search-wrap{max-width:700px;margin:2rem auto;padding:0 1rem}#searchInput{width:100%;padding:1rem;font-size:1.1rem;border:2px solid #4a90d9;border-radius:12px;outline:none}.filters{display:flex;gap:.5rem;max-width:700px;margin:0 auto 1rem;padding:0 1rem;flex-wrap:wrap}.filter-btn{padding:.4rem .9rem;border-radius:20px;border:2px solid #4a90d9;background:#fff;color:#2d6fc4;cursor:pointer;font-size:.85rem}.filter-btn.active{background:#4a90d9;color:#fff}#results{max-width:700px;margin:0 auto;padding:0 1rem 3rem}.card{background:#fff;border-radius:14px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,.07);border-left:5px solid #4a90d9}.card h3{font-size:1.05rem;margin-bottom:.4rem;color:#1a1a2e}.tag{font-size:.75rem;padding:.2rem .6rem;border-radius:10px;background:#e8f0fe;color:#2d6fc4;display:inline-block;margin:.2rem .2rem 0 0}.card p{font-size:.9rem;color:#444;line-height:1.5;margin-top:.5rem}footer{text-align:center;padding:1.5rem;color:#888;font-size:.85rem}</style></head><body><header><h1>Inclusive Accessibility Hub</h1><p>Find adaptive equipment, clothing, tools, tips and resources for every disability and every need</p></header><div class="search-wrap"><input type="search" id="searchInput" placeholder="Search by need, task, condition, product... e.g. one hand, fatigue, shower" aria-label="Search resources"></div><div class="filters" id="filterBar"></div><div id="results"></div><footer>Inclusive Accessibility Hub - Built for every person, every need, every disability</footer><script>const data=[{id:"1",title:"Magnetic Button Shirts",category:"Clothing",summary:"Shirts that look like standard button-downs but use hidden magnets for closure. Ideal for people with limited hand strength, arthritis, or one-handed dressing needs.",keywords:["magnets","buttons","one hand","arthritis","dexterity","dressing"]},{id:"2",title:"Smart Walking Canes",category:"Mobility",summary:"Canes with ultrasonic sensors that detect chest-height obstacles and integrate with GPS for turn-by-turn voice navigation.",keywords:["blind","low vision","navigation","obstacles","cane","smart tech"]},{id:"3",title:"Adaptive Utensil Set",category:"Daily Living",summary:"Weighted or thick-handled utensils designed to stabilize hand tremors and provide a better grip for those with motor challenges.",keywords:["eating","tremors","parkinsons","grip","utensils","spoon","fork"]},{id:"4",title:"Hands-Free Shoes",category:"Clothing",summary:"Shoes with a patented heel that collapses and pops back up, allowing you to step in without using your hands or bending over.",keywords:["shoes","bending","one hand","hands free","footwear"]},{id:"5",title:"Braille Refreshable Displays",category:"Communication",summary:"Electronic devices that connect to computers or phones and raise pins to create Braille characters in real-time.",keywords:["blind","braille","reading","computer","display"]},{id:"6",title:"Bidet Toilet Attachment",category:"Daily Living",summary:"An easy-to-install bidet that helps with cleaning after toileting, significantly increasing independence for those with limited reach.",keywords:["bathroom","toilet","hygiene","wiping","independence"]},{id:"7",title:"Long-Handled Shoe Horn",category:"Clothing",summary:"Extended shoe horns that allow putting on shoes without bending over, helpful for back pain, limited mobility, or post-surgery recovery.",keywords:["shoes","bending","back pain","dressing","mobility"]},{id:"8",title:"Voice-to-Text AAC Apps",category:"Communication",summary:"Apps that convert typed text into natural-sounding speech or use symbols for communication. Essential for nonverbal individuals.",keywords:["nonverbal","speech","communication","AAC","talk","symbols"]}];let idx,activeFilter='';function init(){buildFilters();buildIndex();renderAll()}function buildFilters(){const cats=[...new Set(data.map(d=>d.category))];const bar=document.getElementById('filterBar');const all=document.createElement('button');all.className='filter-btn active';all.textContent='All';all.onclick=()=>setFilter('');bar.appendChild(all);cats.forEach(c=>{const btn=document.createElement('button');btn.className='filter-btn';btn.textContent=c;btn.onclick=()=>setFilter(c);bar.appendChild(btn)})}function setFilter(f){activeFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.textContent===(f||'All')));const q=document.getElementById('searchInput').value.trim();q?doSearch(q):renderAll()}function buildIndex(){idx=lunr(function(){this.ref('id');this.field('title',{boost:10});this.field('summary',{boost:5});this.field('keywords',{boost:8});this.field('category',{boost:4});data.forEach(d=>this.add({...d,keywords:d.keywords.join(' ')}))})}function renderAll(){const filtered=activeFilter?data.filter(d=>d.category===activeFilter):data;render(filtered,'')}function doSearch(q){try{const res=idx.search(q.split(' ').map(t=>t+'~1').join(' '));let found=res.map(r=>data.find(d=>d.id===r.ref)).filter(Boolean);if(activeFilter)found=found.filter(d=>d.category===activeFilter);render(found,q)}catch(e){render([],q)}}function render(items,q){const out=document.getElementById('results');if(!items.length){out.innerHTML='<div style="text-align:center;padding:3rem;color:#777"><h2>No results found</h2><p>Try different keywords like the task you find hard, a body part, or a product name.</p></div>';return}out.innerHTML=items.map(d=>`<div class="card"><h3>${d.title}</h3><span class="tag">${d.category}</span><p>${d.summary}</p></div>`).join('')}document.getElementById('searchInput').addEventListener('input',e=>{const q=e.target.value.trim();q.length>1?doSearch(q):renderAll()});init()</script></body></html>
