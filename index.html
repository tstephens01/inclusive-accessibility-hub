<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Inclusive Accessibility Hub</title><script src="https://unpkg.com/lunr/lunr.js"></script><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Segoe UI,sans-serif;background:#f0f4f8;min-height:100vh}header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:2rem;text-align:center}h1{font-size:2rem;margin-bottom:.5rem}header p{opacity:.85}.search-wrap{max-width:700px;margin:2rem auto;padding:0 1rem}#searchInput{width:100%;padding:1rem;font-size:1.1rem;border:2px solid #4a90d9;border-radius:12px}.filters{display:flex;gap:.5rem;max-width:700px;margin:0 auto 1.5rem;padding:0 1rem}.filter-btn{padding:.4rem .9rem;border-radius:20px;border:2px solid #4a90d9;background:#fff;cursor:pointer}.filter-btn.active{background:#4a90d9;color:#fff}#results{max-width:700px;margin:0 auto;padding:0 1rem}.card{background:#fff;border-radius:14px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,.07)}footer{text-align:center;padding:1.5rem;color:#888}</style></head><body><header><h1>Inclusive Accessibility Hub</h1><p>Find adaptive equipment, clothing, tools, tips and resources for every disability and every need</p></header><div class="search-wrap"><input type="search" id="searchInput" placeholder="Search by need, task, condition, product..."></div><div class="filters" id="filterBar"></div><div id="resultsMeta"></div><div id="results"></div><footer>Inclusive Accessibility Hub</footer><script>fetch('index.json').then(r=>r.json()).then(data=>{window.ALL=data;buildIndex(data);renderAll(data)});let idx,allData=[];function buildIndex(d){allData=d;idx=lunr(function(){this.ref('id');this.field('title');this.field('summary');this.field('keywords');d.forEach(x=>this.add(x))})}function renderAll(d){document.getElementById('results').innerHTML=d.map(x=>`<div class="card"><h3>${x.title}</h3><p>${x.summary}</p></div>`).join('')}</script></body></html>
