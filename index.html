<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inclusive Accessibility Hub</title>
<script src="https://unpkg.com/lunr/lunr.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#1a1a2e;min-height:100vh}
header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:2rem;text-align:center}
header h1{font-size:2rem;margin-bottom:.5rem}
header p{opacity:.85;font-size:1rem}
.search-wrap{max-width:700px;margin:2rem auto;padding:0 1rem}
#searchInput{width:100%;padding:1rem 1.2rem;font-size:1.1rem;border:2px solid #4a90d9;border-radius:12px;outline:none;box-shadow:0 2px 8px rgba(74,144,217,.2)}
#searchInput:focus{border-color:#2d6fc4;box-shadow:0 0 0 3px rgba(74,144,217,.3)}
.filters{display:flex;flex-wrap:wrap;gap:.5rem;max-width:700px;margin:0 auto 1.5rem;padding:0 1rem}
.filter-btn{padding:.4rem .9rem;border-radius:20px;border:2px solid #4a90d9;background:#fff;color:#2d6fc4;cursor:pointer;font-size:.85rem;transition:all .2s}
.filter-btn.active,.filter-btn:hover{background:#4a90d9;color:#fff}
.results-meta{max-width:700px;margin:0 auto .75rem;padding:0 1rem;font-size:.9rem;color:#555}
#results{max-width:700px;margin:0 auto;padding:0 1rem 3rem}
.card{background:#fff;border-radius:14px;padding:1.25rem 1.4rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,.07);border-left:5px solid #4a90d9;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.12)}
.card h3{font-size:1.05rem;margin-bottom:.4rem;color:#1a1a2e}
.card .meta{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.6rem}
.tag{font-size:.75rem;padding:.2rem .6rem;border-radius:10px;background:#e8f0fe;color:#2d6fc4;font-weight:600}
.tag.cat{background:#fce8ff;color:#7b2fa0}
.tag.need{background:#e8fff0;color:#1a7a3c}
.card p{font-size:.9rem;color:#444;line-height:1.55}
.card .links{margin-top:.75rem;display:flex;flex-wrap:wrap;gap:.5rem}
.card .links a{font-size:.82rem;color:#2d6fc4;text-decoration:none;padding:.25rem .6rem;border:1px solid #4a90d9;border-radius:8px}
.card .links a:hover{background:#4a90d9;color:#fff}
.empty{text-align:center;padding:3rem 1rem;color:#777}
.empty h2{font-size:1.3rem;margin-bottom:.5rem}
footer{text-align:center;padding:1.5rem;color:#888;font-size:.82rem;border-top:1px solid #dde}
</style>
</head>
<body>
<header>
<h1>Inclusive Accessibility Hub</h1>
<p>Find adaptive equipment, clothing, tools, tips &amp; resources for every disability and every need</p>
</header>
<div class="search-wrap">
<input type="search" id="searchInput" placeholder="Search by need, task, condition, product... e.g. one hand, fatigue, shower, AAC" aria-label="Search resources">
</div>
<div class="filters" id="filterBar"></div>
<div class="results-meta" id="resultsMeta"></div>
<div id="results"></div>
<footer>Inclusive Accessibility Hub &mdash; Built for every person, every need, every disability</footer>
<script>
const data=[{"id":"1","title":"Magnetic Button Shirts","category":"Clothing","needType":"Dexterity","lifeArea":"Dressing","summary":"Shirts that look like standard button-downs but use hidden magnets for closure. Ideal for people with limited hand strength, arthritis, or one-handed dressing needs.","keywords":["magnets","buttons","one hand","arthritis","dexterity","dressing"],"tags":["Adaptive Apparel","One-Handed Use"],"links":[{"label":"How they work","url":"https://example.com"}]},{"id":"2","title":"Smart Walking Canes","category":"Mobility","needType":"Vision","lifeArea":"Navigation","summary":"Canes with ultrasonic sensors that detect chest-height obstacles and integrate with GPS for turn-by-turn voice navigation.","keywords":["blind","low vision","navigation","obstacles","cane","smart tech"],"tags":["Blindness","Tech"],"links":[]},{"id":"3","title":"Adaptive Utensil Set","category":"Daily Living","needType":"Dexterity","lifeArea":"Eating","summary":"Weighted or thick-handled utensils designed to stabilize hand tremors and provide a better grip for those with motor challenges.","keywords":["eating","tremors","parkinsons","grip","utensils","spoon","fork"],"tags":["Kitchen Tools","Tremor Support"],"links":[]},{"id":"bulk-1","title":"Kizik Hands-Free Shoes","category":"Clothing","needType":"Mobility","lifeArea":"Dressing","summary":"Shoes with a patented heel that collapses and pops back up, allowing you to step in without using your hands or bending over.","keywords":["shoes","bending","one hand","hands free","footwear"],"tags":["Universal Design","Independence"],"links":[{"label":"Shop Kizik","url":"https://kizik.com"}]},{"id":"bulk-2","title":"Braille Refreshable Displays","category":"Communication","needType":"Vision","lifeArea":"Work/School","summary":"Electronic devices that connect to computers/phones and raise pins to create Braille characters in real-time.","keywords":["blind","braille","reading","computer","display"],"tags":["Blindness","Tech"],"links":[{"label":"NLS Guide","url":"https://www.loc.gov/nls"}]},{"id":"bulk-3","title":"Bidet Toilet Attachment","category":"Daily Living","needType":"Dexterity","lifeArea":"Hygiene","summary":"An easy-to-install bidet that helps with cleaning after toileting, significantly increasing independence for those with limited reach.","keywords":["bathroom","toilet","hygiene","wiping","independence"],"tags":["Bathroom Access","Personal Care"],"links":[]},{"id":"4","title":"Long-Handled Shoe Horn","category":"Clothing","needType":"Mobility","lifeArea":"Dressing","summary":"Extended shoe horns that allow putting on shoes without bending over, helpful for back pain, limited mobility, or post-surgery recovery.","keywords":["shoes","bending","back pain","dressing","mobility"],"tags":["Mobility Aid"],"links":[]},{"id":"5","title":"Voice-to-Text AAC Apps","category":"Communication","needType":"Speech","lifeArea":"Social","summary":"Apps that convert typed text into natural-sounding speech or use symbols for communication. Essential for nonverbal individuals or those with speech impairments.","keywords":["nonverbal","speech","communication","AAC","talk","symbols"],"tags":["Communication","App"],"links":[]}];.then(r=>r.json())
  window.ALL=data;
buildFilters(data);
buildIndex(data);
renderAll(data);
});

let idx,allData=[];

function buildIndex(data){
allData=data;
idx=lunr(function(){
this.ref('id');
this.field('title',{boost:10});
this.field('summary',{boost:5});
this.field('keywords',{boost:8});
this.field('category',{boost:4});
this.field('needType',{boost:4});
this.field('lifeArea',{boost:3});
this.field('tags',{boost:3});
data.forEach(d=>{
this.add({...d,keywords:d.keywords?d.keywords.join(' '):''});
});
});
}

function buildFilters(data){
const cats=[...new Set(data.map(d=>d.category).filter(Boolean))];
const bar=document.getElementById('filterBar');
const all=document.createElement('button');
all.className='filter-btn active';all.textContent='All';all.dataset.filter='';
all.addEventListener('click',e=>filterClick(e));
bar.appendChild(all);
cats.forEach(c=>{
const b=document.createElement('button');
b.className='filter-btn';b.textContent=c;b.dataset.filter=c;
b.addEventListener('click',e=>filterClick(e));
bar.appendChild(b);
});
}

let activeFilter='';
function filterClick(e){
activeFilter=e.target.dataset.filter;
document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter===activeFilter));
const q=document.getElementById('searchInput').value.trim();
if(q) doSearch(q); else renderAll(allData);
}

document.getElementById('searchInput').addEventListener('input',e=>{
const q=e.target.value.trim();
if(q.length>1) doSearch(q); else renderAll(allData);
});

function doSearch(q){
const synonyms={"one hand":["hemiplegia","single hand","unilateral"],"fatigue":["energy","tired","low energy","ME","CFS","spoons"],"shower":["bathing","bath","wash"],"toilet":["bathroom","commode","bidet"],"wheelchair":["rolling","power chair","manual chair"],"blind":["vision","low vision","visual impairment"],"deaf":["hearing","hard of hearing","hearing loss"],"communication":["AAC","speech","nonverbal","augmentative"],"dressing":["clothing","adaptive clothing","getting dressed"],"walking":["gait","mobility","ambulation"],"pain":["chronic pain","ache","discomfort"],"brain fog":["cognitive","memory","concentration"],"sensory":["sensory processing","overstimulation","SPD"]};
let expanded=q;
Object.entries(synonyms).forEach(([k,v])=>{
if(q.toLowerCase().includes(k)) expanded+=" "+v.join(" ");
});
try{
const res=idx.search(expanded.split(' ').map(t=>t+'~1').join(' '));
let found=res.map(r=>allData.find(d=>d.id===r.ref)).filter(Boolean);
if(activeFilter) found=found.filter(d=>d.category===activeFilter);
render(found,q);
}catch(e){render([],q);}
}

function renderAll(data){
const filtered=activeFilter?data.filter(d=>d.category===activeFilter):data;
render(filtered,'');
}

function render(items,q){
const meta=document.getElementById('resultsMeta');
const out=document.getElementById('results');
if(!items.length){
meta.textContent='';
out.innerHTML='<div class="empty"><h2>No results found</h2><p>Try different words like the task you find hard, a body part, or a product name.</p></div>';
return;
}
meta.textContent=q?`${items.length} result${items.length!==1?'s':''} for "${q}"`:`Showing all ${items.length} resources`;
out.innerHTML=items.map(d=>`
<div class="card">
<h3>${d.title}</h3>
<div class="meta">
${d.category?`<span class="tag cat">${d.category}</span>`:''}
${d.needType?`<span class="tag need">${d.needType}</span>`:''}
${d.lifeArea?`<span class="tag">${d.lifeArea}</span>`:''}
${(d.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}
</div>
<p>${d.summary}</p>
${d.links&&d.links.length?`<div class="links">${d.links.map(l=>`<a href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`).join('')}</div>`:''}
</div>`).join('');
}
</script>
</body>
</html>
